org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Suppress compileSdk warning
android.suppressUnsupportedCompileSdk=36

# Build performance optimizations
org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.configureondemand=true
org.gradle.caching=true

# Allow network downloads during build (disable offline mode)
org.gradle.offline=false

# Network timeouts (increased)
systemProp.org.gradle.internal.http.connectionTimeout=1800000
systemProp.org.gradle.internal.http.socketTimeout=1800000
systemProp.http.socketTimeout=1800000
systemProp.http.connectionTimeout=1800000

# Kotlin optimizations
kotlin.incremental=true
kotlin.incremental.android=true

# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=true
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
